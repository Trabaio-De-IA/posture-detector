<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PostureAI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="nav">
  <a class="brand" href="{{ url_for('main.index') }}">
    <span class="brand__mark"></span>
    <span class="brand__name">Posture<b>AI</b></span>
  </a>
  <nav class="nav__links">
    <a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' %}active{% endif %}">Monitor</a>
    <a href="{{ url_for('main.about') }}" class="{% if request.endpoint == 'main.about' %}active{% endif %}">Sobre</a>
    <a href="{{ url_for('main.team') }}" class="{% if request.endpoint == 'main.team' %}active{% endif %}">Equipe</a>
  </nav>
  {% block nav_extra %}{% endblock %}
</header>

{% block settings_panel %}{% endblock %}

<main class="wrap">
  {% block content %}{% endblock %}
</main>

<footer class="foot">
  PostureAI &mdash; Detecção de Postura em Tempo Real &middot; <b>MediaPipe Tasks JS + WebAssembly + Flask</b>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
